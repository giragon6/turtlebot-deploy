<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nest Prediction</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Sea Turtle Nest Presence Prediction</h1>

      <form id="predictForm">
        <div class="row" id="latlong">
          <label>Latitude: <input type="text" id="latitude" name="latitude" value="34.2074769"></label>
          <label>Longitude: <input type="text" id="longitude" name="longitude" value="-77.7946203"></label>
        </div>

        <fieldset>
          <legend>Features</legend>
          {% for f in feature_names %}
          <label class="feature">{{ feature_disp[f] }}: <input type="number" step="any" name="{{ f }}" value="0" required></label>
          {% endfor %}
        </fieldset>

        <div class="row">
            <button type="button" id="randomizeFeaturesBtn">Input Sample Feature Values</button>
            <button type="submit">Predict and Show on Map</button>
        </div>        
      </form>

      <div id="result">
        <h2>Prediction</h2>
        <div id="predictionOutput">No prediction yet.</div>
      </div>

      <div id="mapWrap">
        <iframe id="mapframe" width="100%" height="400" frameborder="0" style="border:0" src="" allowfullscreen></iframe>
        <div id="mapLink"></div>
      </div>
    </div>

    <script>
        window.featureStats = {
        means: {{ feature_means | tojson }},
        stdevs: {{ feature_stdevs | tojson }}
    };
    </script>
    <script src="/static/main.js"></script>
  </body>
</html>
